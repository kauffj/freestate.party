    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fefce8',
                            100: '#fef9c3',
                            200: '#fef08a',
                            300: '#fde047',
                            400: '#facc15',
                            500: '#d4a017',
                            600: '#b8860b',
                            700: '#92700c',
                            800: '#6b5210',
                            900: '#422d08',
                        },
                        dark: {
                            50: '#f8f8f8',
                            100: '#e0e0e0',
                            200: '#b0b0b0',
                            300: '#808080',
                            400: '#505050',
                            500: '#2a2a2a',
                            600: '#1f1f1f',
                            700: '#181818',
                            800: '#141414',
                            900: '#0a0a0a',
                        }
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'Georgia', 'serif'],
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        .gold-gradient {
            background: linear-gradient(135deg, #d4a017 0%, #facc15 50%, #d4a017 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: #d4a017;
        }

        /* Cycling word animation (home page only) */
        .cycle-word {
            display: inline-block;
            min-width: 200px;
            padding-bottom: 0.15em;
            transition: opacity 300ms ease;
        }
        .cycle-word.fade-out {
            opacity: 0;
        }

        /* Nav transition */
        .nav-scrolled {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 160, 23, 0.15);
        }

        /* Video styling */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 0.5rem;
        }
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(10, 10, 10, 0.3);
            border-radius: 0.5rem;
            transition: background 200ms ease;
            border: none;
            padding: 0;
        }
        .video-overlay:hover {
            background: rgba(10, 10, 10, 0.15);
        }
        .video-overlay svg {
            transition: transform 200ms ease;
        }
        .video-overlay:hover svg {
            transform: scale(1.1);
        }

        /* Form focus styles */
        .form-input:focus {
            outline: none;
            border-color: #d4a017;
            box-shadow: 0 0 0 2px rgba(212, 160, 23, 0.25);
        }

        /* Focus ring for keyboard navigation */
        :focus-visible {
            outline: 2px solid #d4a017;
            outline-offset: 2px;
        }

        /* Active nav link */
        .nav-active {
            color: #d4a017;
        }
    </style>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Free State Party",
        "description": "A private club for liberty-minded free staters in New Hampshire.",
        "url": "https://freestate.party",
        "areaServed": {
            "@type": "State",
            "name": "New Hampshire"
        }
    }
    </script>

    <!-- Analytics -->
    <script defer data-domain="freestate.party" src="https://plausible.freestate.party/js/script.js"></script>
</head>
<body class="bg-dark-900 text-dark-100 antialiased min-h-screen flex flex-col">

    <!-- Skip to content -->
    <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[60] focus:bg-gold-500 focus:text-dark-900 focus:px-4 focus:py-2 focus:rounded">Skip to content</a>

    <!-- ========== NAVIGATION ========== -->
    <header id="nav" class="fixed top-0 left-0 right-0 z-50 transition-[background-color,border-color,backdrop-filter] duration-300 bg-dark-900/80 backdrop-blur-sm">
        <nav class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <!-- Wordmark -->
            <a href="./" class="font-display font-bold text-lg sm:text-xl text-dark-50 tracking-tight flex items-center">
                <img src="./img/logo.svg" alt="Free State Party" width="28" height="28" class="mr-2 inline-block">
                Free State <span class="text-gold-500 ml-1">Party</span>
            </a>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="./events/" class="text-dark-200 hover:text-gold-500 transition-colors">Events</a>
                <a href="./about/" class="text-dark-200 hover:text-gold-500 transition-colors">About</a>
            </div>

            <!-- Mobile Menu Button -->
            <button id="menu-toggle" class="md:hidden p-2 text-dark-200 min-w-[44px] min-h-[44px] flex items-center justify-center" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-menu">
                <svg id="menu-icon-open" class="w-6 h-6" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
                <svg id="menu-icon-close" class="w-6 h-6 hidden" width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </nav>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-dark-900/95 backdrop-blur-lg border-t border-dark-700 px-4 pb-6">
            <div class="flex flex-col gap-1 pt-4 text-base font-medium">
                <a href="./events/" class="mobile-link py-3 px-4 text-dark-200 hover:text-gold-500 rounded-lg transition-colors">Events</a>
                <a href="./about/" class="mobile-link py-3 px-4 text-dark-200 hover:text-gold-500 rounded-lg transition-colors">About</a>
            </div>
        </div>
    </header>

    <!-- ========== PAGE CONTENT ========== -->
    <main id="main" class="flex-grow">
    
    <section class="min-h-screen flex flex-col justify-center px-6 pt-20 pb-12 md:py-0">
        <div class="max-w-6xl mx-auto w-full lg:grid lg:grid-cols-2 lg:gap-12 lg:items-center">
            <div>
                <h1 class="font-display text-4xl sm:text-5xl md:text-6xl lg:text-5xl xl:text-6xl font-bold leading-tight mb-6">
                    <span class="text-dark-50">A private club for</span><br>
                    <span class="gold-gradient cycle-word" id="cycling-word" aria-live="polite">patriot</span><br>
                    <span class="text-dark-50">free staters.</span>
                </h1>
                <p class="text-xl sm:text-2xl lg:text-xl xl:text-2xl text-dark-200 leading-relaxed max-w-2xl mb-10 font-display italic">
                    We have a plan.
                </p>
                <a href="./events/" class="inline-block bg-gold-500 hover:bg-gold-400 text-dark-900 font-bold text-lg px-10 py-4 rounded-lg transition-colors min-h-[48px]">
                    Meet Us
                </a>
            </div>
            <div class="mt-12 lg:mt-0">
                <div class="video-container shadow-2xl" id="video-wrapper">
                    <video data-video-player preload="metadata" playsinline>
                        <source src="./video/homepage.mp4" type="video/mp4">
                    </video>
                    <button data-video-play class="video-overlay text-gold-500" aria-label="Play video">
                        <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
                            <circle cx="36" cy="36" r="35" stroke="currentColor" stroke-width="2" class="fill-dark-900/60"/>
                            <polygon points="28,20 28,52 54,36" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </section>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="px-6 py-12 border-t border-dark-800">
        <div class="max-w-3xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <a href="./" class="font-display text-lg text-dark-50 flex items-center">
                <img src="./img/logo.svg" alt="Free State Party" width="24" height="24" class="mr-2 inline-block">
                Free State <span class="text-gold-500 ml-1">Party</span>
            </a>
            <div class="flex items-center gap-6 text-sm text-dark-300">
                <a href="./events/" class="hover:text-dark-200 transition-colors">Events</a>
                <a href="./about/" class="hover:text-dark-200 transition-colors">About</a>
                <a href="./business/" class="hover:text-dark-200 transition-colors">Business</a>
            </div>
            <p class="text-dark-500 text-sm">New Hampshire</p>
        </div>
    </footer>

    <!-- ========== SCRIPTS ========== -->
    <script>
        // --- Mobile Nav Toggle ---
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const iconOpen = document.getElementById('menu-icon-open');
        const iconClose = document.getElementById('menu-icon-close');

        function closeMenu() {
            mobileMenu.classList.add('hidden');
            iconOpen.classList.remove('hidden');
            iconClose.classList.add('hidden');
            menuToggle.setAttribute('aria-expanded', 'false');
        }

        function openMenu() {
            mobileMenu.classList.remove('hidden');
            iconOpen.classList.add('hidden');
            iconClose.classList.remove('hidden');
            menuToggle.setAttribute('aria-expanded', 'true');
        }

        menuToggle.addEventListener('click', () => {
            const isOpen = !mobileMenu.classList.contains('hidden');
            if (isOpen) { closeMenu(); } else { openMenu(); }
        });

        // Escape key closes menu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !mobileMenu.classList.contains('hidden')) {
                closeMenu();
                menuToggle.focus();
            }
        });

        // Close mobile menu on link click
        document.querySelectorAll('.mobile-link').forEach(link => {
            link.addEventListener('click', () => closeMenu());
        });

        // --- Nav Background on Scroll ---
        const nav = document.getElementById('nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('nav-scrolled');
            } else {
                nav.classList.remove('nav-scrolled');
            }
        }, { passive: true });
    </script>

    <!-- Page-specific scripts -->
    <script>
        const words = ["patriot", "builder", "enterprising", "nationalist", "pro-natal", "right-wing", "maker", "anti-communist", "free-market"];
        const el = document.getElementById('cycling-word');
        let currentIndex = 0;
        let paused = false;

        function cycleWord() {
            if (paused) return;
            el.classList.add('fade-out');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % words.length;
                el.textContent = words[currentIndex];
                el.classList.remove('fade-out');
            }, 300);
        }

        setInterval(cycleWord, 2500);

        document.addEventListener('visibilitychange', () => {
            paused = document.hidden;
        });

    </script>
    <script src="./js/video-player.js"></script>
</body>
</html>
